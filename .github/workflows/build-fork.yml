name: Build Fork Firmware
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build ESP32
        run: pio run -e esp32
      - name: Collect flash files
        run: |
          mkdir -p flash
          cp .pio/build/esp32/firmware.bin flash/
          cp .pio/build/esp32/partitions.bin flash/
          cp .pio/build/esp32/bootloader.bin flash/
          find ~/.platformio -name "boot_app0.bin" -exec cp {} flash/ \;
          ls -la flash/
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: espresense-fork-esp32
          path: flash/
          retention-days: 90
